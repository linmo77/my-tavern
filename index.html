<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>小酒馆</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=ZCOOL+XiaoWei&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
:root{--bg:#1a1a2e;--chat-bg:#16213e;--user:#0f3460;--ai:#1a1a2e;--text:#e0e0e0;--accent:#e94560;--input:#0f3460}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;font-size:16px;height:100vh;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;max-width:600px;margin:0 auto}
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--chat-bg);border-bottom:1px solid rgba(255,255,255,0.1)}
.top-bar .title{font-size:18px;font-weight:bold}
.btn-icon{background:none;border:none;font-size:22px;cursor:pointer}
.chat-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}
.system-msg{text-align:center;color:#888;font-size:14px;padding:20px 0}
.message{max-width:85%;padding:10px 14px;border-radius:16px;line-height:1.6;word-wrap:break-word;animation:fadeIn .3s ease}
.message.user{align-self:flex-end;background:var(--user);border-bottom-right-radius:4px}
.message.assistant{align-self:flex-start;background:var(--ai);border:1px solid rgba(255,255,255,0.08);border-bottom-left-radius:4px}
.role-tag{font-size:12px;color:var(--accent);margin-bottom:4px;display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.input-bar{display:flex;gap:8px;padding:10px 16px;background:var(--chat-bg);border-top:1px solid rgba(255,255,255,0.1);align-items:flex-end}
.input-bar textarea{flex:1;background:var(--input);border:none;border-radius:20px;padding:10px 16px;color:var(--text);font-size:16px;font-family:inherit;resize:none;max-height:120px;outline:none}
.input-bar button{background:var(--accent);color:#fff;border:none;border-radius:20px;padding:10px 20px;font-size:15px;cursor:pointer;white-space:nowrap}
.input-bar button:active{opacity:.8}
.settings-panel{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:100;display:flex;justify-content:center;align-items:center}
.settings-panel.hidden{display:none}
.settings-content{background:var(--chat-bg);border-radius:16px;padding:24px;width:90%;max-width:400px;max-height:80vh;overflow-y:auto}
.settings-content h3{margin-bottom:16px;text-align:center}
.settings-content label{display:block;margin-top:12px;margin-bottom:4px;font-size:14px;color:#aaa}
.settings-content input,.settings-content select{width:100%;padding:10px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:var(--bg);color:var(--text);font-size:15px;outline:none}
.btn-save{width:100%;margin-top:20px;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:16px;cursor:pointer}
.btn-close{width:100%;margin-top:8px;padding:12px;background:transparent;color:#aaa;border:1px solid rgba(255,255,255,0.15);border-radius:10px;font-size:16px;cursor:pointer}
.typing-indicator span{display:inline-block;width:8px;height:8px;background:var(--accent);border-radius:50%;margin:0 2px;animation:bounce 1.2s infinite}
.typing-indicator span:nth-child(2){animation-delay:.2s}
.typing-indicator span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}
</style>
</head>
<body>
<div id="app">
<header class="top-bar">
<span class="title">🏮 小酒馆</span>
<button class="btn-icon" onclick="toggleSettings()">⚙️</button>
</header>
<div id="settings-panel" class="settings-panel hidden">
<div class="settings-content">
<h3>⚙️ 设置</h3>
<label>API 地址</label>
<input type="text" id="apiUrl" placeholder="https://api.openai.com">
<label>API 密钥</label>
<input type="password" id="apiKey" placeholder="sk-...">
<label>模型名称</label>
<input type="text" id="model" placeholder="gpt-3.5-turbo">
<label>聊天字体</label>
<select id="fontSelect" onchange="changeFont(this.value)">
<option value="system">系统默认</option>
<option value="'Noto Serif SC',serif">思源宋体</option>
<option value="'ZCOOL XiaoWei',serif">站酷小薇</option>
<option value="'Ma Shan Zheng',cursive">马善政毛笔</option>
</select>
<label>字体大小</label>
<input type="range" id="fontSize" min="14" max="24" value="16" oninput="changeFontSize(this.value)">
<span id="fontSizeLabel">16px</span>
<button class="btn-save" onclick="saveSettings()">保存设置</button>
<button class="btn-close" onclick="toggleSettings()">关闭</button>
</div>
</div>
<main id="chatArea" class="chat-area">
<div class="system-msg">欢迎来到小酒馆，开始聊天吧 ✨</div>
</main>
<footer class="input-bar">
<textarea id="userInput" placeholder="说点什么..." rows="1" oninput="autoResize(this)"></textarea>
<button onclick="sendMessage()">发送</button>
</footer>
</div>
<script>
function loadSettings(){return{apiUrl:localStorage.getItem('apiUrl')||'',apiKey:localStorage.getItem('apiKey')||'',model:localStorage.getItem('model')||'gpt-3.5-turbo',font:localStorage.getItem('font')||'system',fontSize:localStorage.getItem('fontSize')||'16'}}
function init(){var s=loadSettings();document.getElementById('apiUrl').value=s.apiUrl;document.getElementById('apiKey').value=s.apiKey;document.getElementById('model').value=s.model;document.getElementById('fontSelect').value=s.font;document.getElementById('fontSize').value=s.fontSize;document.getElementById('fontSizeLabel').textContent=s.fontSize+'px';if(s.font!=='system')changeFont(s.font);changeFontSize(s.fontSize)}
function toggleSettings(){document.getElementById('settings-panel').classList.toggle('hidden')}
function saveSettings(){localStorage.setItem('apiUrl',document.getElementById('apiUrl').value.trim());localStorage.setItem('apiKey',document.getElementById('apiKey').value.trim());localStorage.setItem('model',document.getElementById('model').value.trim());localStorage.setItem('font',document.getElementById('fontSelect').value);localStorage.setItem('fontSize',document.getElementById('fontSize').value);toggleSettings()}
function changeFont(v){var c=document.getElementById('chatArea');c.style.fontFamily=v==='system'?'system-ui,-apple-system,sans-serif':v;localStorage.setItem('font',v)}
function changeFontSize(s){document.getElementById('chatArea').style.fontSize=s+'px';document.getElementById('fontSizeLabel').textContent=s+'px'}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px'}
function appendMessage(role,content){var c=document.getElementById('chatArea'),d=document.createElement('div');d.className='message '+role;var t=document.createElement('span');t.className='role-tag';t.textContent=role==='user'?'你':'🤖 AI';var p=document.createElement('div');p.textContent=content;d.appendChild(t);d.appendChild(p);c.appendChild(d);c.scrollTop=c.scrollHeight;return d}
function showTyping(){var c=document.getElementById('chatArea'),d=document.createElement('div');d.className='message assistant';d.id='typing';d.innerHTML='<div class="typing-indicator"><span></span><span></span><span></span></div>';c.appendChild(d);c.scrollTop=c.scrollHeight}
function removeTyping(){var e=document.getElementById('typing');if(e)e.remove()}
async function sendMessage(){var input=document.getElementById('userInput'),msg=input.value.trim();if(!msg)return;input.value='';input.style.height='auto';appendMessage('user',msg);var s=loadSettings();if(!s.apiUrl||!s.apiKey){appendMessage('assistant','请先点右上角 ⚙️ 设置 API 地址和密钥哦~');return}showTyping();try{var res=await fetch(s.apiUrl+'/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+s.apiKey},body:JSON.stringify({model:s.model||'gpt-3.5-turbo',messages:[{role:'user',content:msg}],temperature:0.8})});var data=await res.json();removeTyping();appendMessage('assistant',data.choices&&data.choices[0]?data.choices[0].message.content:'回复出错了...')}catch(err){removeTyping();appendMessage('assistant','连接失败：'+err.message)}}
document.addEventListener('keydown',function(e){if(e.target.id==='userInput'&&e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}});
init();
</script>
</body>
</html>
