<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>墨墨的专属工作站</title>
    <!-- 引入霞鹜文楷字体 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-lite-webfont@1.1.0/style.css" />
</head>
<body>
    <!-- 背景层 -->
    <div id="bg-layer"></div>

    <!-- 桌面：放置软件图标 -->
    <div id="desktop">
        <div class="app-icon" id="btn-open-app">
            <div class="icon-shape">角</div>
            <div class="icon-name">角色卡生成</div>
        </div>
    </div>

    <!-- 苹果风格悬浮球 -->
    <div id="floating-ball"></div>

    <!-- 悬浮球控制中心 (默认隐藏) -->
    <div id="control-panel" class="hidden">
        <div class="panel-header">
            <span>控制中心</span>
            <span class="close-btn" id="close-panel">关闭</span>
        </div>
        <div class="panel-content">
            <div class="setting-group">
                <label>API 接入 (中转站)</label>
                <input type="text" id="api-url" placeholder="输入 API URL">
                <input type="password" id="api-key" placeholder="输入 API Key">
                <input type="text" id="api-model" placeholder="输入模型名称 (如 gpt-4)">
                <button id="save-api-btn">保存配置</button>
            </div>
            <div class="setting-group">
                <label>主题颜色调配</label>
                <input type="text" id="color-primary" placeholder="主色调 (默认 #adcdea)">
                <input type="text" id="color-bg" placeholder="背景色 (默认 #ffffff)">
                <button id="save-color-btn">保存主题</button>
            </div>
            <div class="setting-group">
                <label>字体设置</label>
                <select id="font-select">
                    <option value="LXGW WenKai Lite">霞鹜文楷 (开源)</option>
                    <option value="SimSun">宋体</option>
                    <option value="Custom">自定义字体</option>
                </select>
                <input type="file" id="font-upload" accept=".ttf" style="display:none;">
                <button id="upload-font-btn">上传 TTF 字体</button>
            </div>
            <div class="setting-group">
                <label>背景设置</label>
                <input type="file" id="bg-upload" accept="image/*" style="display:none;">
                <button id="upload-bg-btn">上传背景图片</button>
            </div>
            <div class="setting-group">
                <label>开发者工具</label>
                <button id="open-notebook-btn">笔记本</button>
                <button id="open-editor-btn">代码编辑器</button>
            </div>
        </div>
    </div>

    <!-- 角色卡生成 APP 窗口 (默认隐藏) -->
    <div id="app-window" class="hidden">
        
        <!-- 第一页：主页 -->
        <div id="page-1" class="app-page">
            <div class="page-title">角色卡生成</div>
            <button class="main-btn" id="btn-create-role">创建角色</button>
            <div class="role-manage-section">
                <div class="section-title">管理角色</div>
                <div id="role-list" class="role-list">
                    <!-- 角色列表将通过 JS 动态生成 -->
                </div>
            </div>
            <div class="bottom-bar">
                <button class="text-btn" id="btn-exit-app">退出</button>
            </div>
        </div>

        <!-- 第二页：基础信息 -->
        <div id="page-2" class="app-page hidden">
            <div class="page-title">基础资料</div>
            <div class="form-group">
                <label>名称</label>
                <input type="text" id="role-name" placeholder="输入角色名称">
            </div>
            <div class="form-group">
                <label>年龄</label>
                <input type="number" id="role-age" placeholder="输入年龄">
            </div>
            <div class="form-group">
                <label>身高 (cm)</label>
                <input type="number" id="role-height" placeholder="输入身高">
            </div>
            <div class="form-group">
                <label>性别</label>
                <div class="radio-group">
                    <label><input type="radio" name="role-gender" value="男"> 男</label>
                    <label><input type="radio" name="role-gender" value="女" checked> 女</label>
                </div>
            </div>
            <div class="bottom-bar flex-between">
                <button class="text-btn" id="btn-prev-to-1">上一步</button>
                <button class="text-btn" id="btn-next-to-3">下一步</button>
            </div>
        </div>

        <!-- 第三页：创建形象 (女性向) -->
        <div id="page-3" class="app-page hidden">
            <div class="page-title">详细形象</div>
            <textarea id="role-prompt" placeholder="AI将根据下方选项生成描述，您也可在此手动修改..."></textarea>
            
            <div class="scroll-selector">
                <label>眼型 <span class="detail-hint" onclick="showDetail('eye')">详情</span></label>
                <div class="scroll-options" id="eye-options">
                    <div class="option active" data-val="桃花眼">桃花眼</div>
                    <div class="option" data-val="狐狸眼">狐狸眼</div>
                    <div class="option" data-val="杏眼">杏眼</div>
                    <div class="option" data-val="瑞凤眼">瑞凤眼</div>
                </div>
            </div>

            <div class="scroll-selector">
                <label>头发长度</label>
                <div class="scroll-options" id="hair-options">
                    <div class="option active" data-val="及腰长发">及腰长发</div>
                    <div class="option" data-val="齐肩中发">齐肩中发</div>
                    <div class="option" data-val="利落短发">利落短发</div>
                </div>
            </div>

            <div class="scroll-selector">
                <label>胸部丰满度</label>
                <div class="scroll-options" id="breast-options">
                    <div class="option" data-val="盈盈一握">盈盈一握</div>
                    <div class="option active" data-val="丰满挺拔">丰满挺拔</div>
                    <div class="option" data-val="波涛汹涌">波涛汹涌</div>
                </div>
            </div>

            <div class="scroll-selector">
                <label>私密体香 <span class="detail-hint" onclick="showDetail('scent')">详情</span></label>
                <div class="scroll-options" id="scent-options">
                    <div class="option active" data-val="幽兰暗香">幽兰暗香</div>
                    <div class="option" data-val="奶香蜜桃">奶香蜜桃</div>
                    <div class="option" data-val="冷冽玫瑰">冷冽玫瑰</div>
                </div>
            </div>

            <div class="form-group">
                <label>AI 生成字数</label>
                <input type="number" id="ai-word-count" placeholder="例如：300" value="300">
            </div>

            <button class="main-btn" id="btn-generate-ai">AI 生成形象</button>

            <div class="bottom-bar flex-between">
                <button class="text-btn" id="btn-prev-to-2">上一步</button>
                <button class="text-btn" id="btn-final-confirm">最终确认</button>
            </div>
        </div>
    </div>

    <!-- 详情弹窗 (用于显示眼型、体香详情等) -->
    <div id="info-modal" class="hidden">
        <div class="modal-box">
            <h3 id="info-title">详情</h3>
            <p id="info-content">内容</p>
            <button class="main-btn" id="close-info-modal">我知道了</button>
        </div>
    </div>

    <!-- 角色详情弹窗 -->
    <div id="role-detail-modal" class="hidden">
        <div class="modal-box">
            <h3 id="detail-name">角色名</h3>
            <div id="detail-content" class="detail-text"></div>
            <div class="flex-between" style="margin-top: 15px;">
                <button class="text-btn" id="close-role-detail">关闭</button>
                <button class="main-btn" id="copy-role-detail">一键复制</button>
            </div>
        </div>
    </div>

    <!-- 隐藏的头像上传控件 -->
    <input type="file" id="avatar-upload" accept="image/*" style="display:none;">

</body>
</html>
